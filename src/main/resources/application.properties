spring.application.name=ziprun

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/hackathon
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:deepak}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA - create-drop recreates schema but data.sql won't run unless deferred
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# CRITICAL - without these two lines data.sql never executes
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Flyway runs AFTER Hibernate creates the schema
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# LLM - Gemini
llm.provider=gemini
llm.api-key=${GEMINI_API_KEY:your-gemini-api-key-here}
llm.model=gemini-1.5-flash
llm.base-url=https://generativelanguage.googleapis.com
llm.timeout-seconds=15

# Routing
routing.strategy=AI

# Async thread pool
async.core-pool-size=4
async.max-pool-size=8
async.queue-capacity=100

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# CORS
cors.allowed-origins=http://localhost:5173,http://localhost:4200